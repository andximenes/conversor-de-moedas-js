<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas</title>

    <link rel="stylesheet" href="./styles/index.css">


</head>
<body>
    <div id="project">
        <img src="./images/Background.svg" alt="Plano de fundo" id="background-image">

        <header>
            <img src="./images/logo.svg" alt="logo do projeto" id="logo">
        </header>

        <div class="container">
            <form action="">
                <div class="inputs-model">
                    <label for="value-input">Valor</label>
                    <input type="number" id="value-input">
                </div>

                <div class="inputs-model">
                    <label for="currency-select">Moeda</label>
                    <select name="currency" id="currency-select">
                        <option value="USD">Dólar Americano (USD)</option>
                        <option value="EUR">Euro (EUR)</option>
                        <option value="GBP">Libra Esterlina (GBP)</option>
                    </select>
                </div>

                <div class="inputs-model">
                    <button type="submit">Converte em reais</button>
                </div>
            </form>

            <div class="result-box">
                <div class="iten-1">
                    <p id="exchange-rate">US$ 1 = R$ 0,00</p>
                </div>
                <div class="iten-2">
                    <h2 id="converted-value">0,00 Reais</h2>
                </div>
                
            </div>
        </div>
    </div>

    <script src="./script/script.js"></script>
</body>
</html>
